name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ParakeetPtt.sln --locked-mode

      - name: Test
        run: dotnet test ParakeetPtt.sln --configuration Release --no-restore

      - name: Audit NuGet packages
        run: dotnet list ParakeetPtt.sln package --vulnerable --include-transitive
