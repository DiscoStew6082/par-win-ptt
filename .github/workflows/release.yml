name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build release
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ParakeetPtt.sln --locked-mode

      - name: Test
        run: dotnet test ParakeetPtt.sln --configuration Release --no-restore

      - name: Audit NuGet packages
        run: dotnet list ParakeetPtt.sln package --vulnerable --include-transitive

      - name: Publish
        run: dotnet publish src\ParakeetPtt.App\ParakeetPtt.App.csproj -c Release -r win-x64 --self-contained true --no-restore -o publish\win-x64

      - name: Install SBOM tool
        run: dotnet tool install --global CycloneDX --version 6.2.0

      - name: Generate SBOM
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          dotnet-CycloneDX ParakeetPtt.sln -o publish -fn ParakeetPtt.cdx.json -F Json -t --set-name ParakeetPtt --set-version $env:GITHUB_REF_NAME

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path publish\win-x64\* -DestinationPath publish\ParakeetPtt-win-x64.zip -Force
          $hash = (Get-FileHash publish\ParakeetPtt-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ParakeetPtt-win-x64.zip" | Set-Content -NoNewline -Encoding ascii publish\ParakeetPtt-win-x64.zip.sha256

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParakeetPtt-win-x64
          path: |
            publish/ParakeetPtt-win-x64.zip
            publish/ParakeetPtt-win-x64.zip.sha256
            publish/ParakeetPtt.cdx.json

      - name: Attest release artifact
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: publish/ParakeetPtt-win-x64.zip

  publish:
    name: Draft GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: ParakeetPtt-win-x64
          path: publish

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            publish\ParakeetPtt-win-x64.zip `
            publish\ParakeetPtt-win-x64.zip.sha256 `
            publish\ParakeetPtt.cdx.json `
            --draft `
            --repo $env:GITHUB_REPOSITORY `
            --title $env:GITHUB_REF_NAME `
            --notes "See README.md and SECURITY.md for privacy, verification, and third-party runtime/model asset notes."
